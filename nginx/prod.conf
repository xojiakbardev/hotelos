# Production nginx config — serves the Vue SPA from /usr/share/nginx/html
# and reverse-proxies the six backend services on the private docker
# network. Service names resolve via Docker's embedded DNS.

upstream auth_service          { server auth-service:8000; }
upstream reception_service     { server reception-service:8000; }
upstream housekeeping_service  { server housekeeping-service:8000; }
upstream room_service          { server room-service:8000; }
upstream maintenance_service   { server maintenance-service:8000; }
upstream ws_gateway            { server ws-gateway:8000; }

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 8m;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Request-Id       $trace_id;
    proxy_http_version 1.1;

    # ----- API routes -----
    # Each /api/<service>/* strips its prefix before forwarding.

    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /$1 break;
        proxy_pass http://auth_service;
    }
    location /api/reception/ {
        rewrite ^/api/reception/(.*)$ /$1 break;
        proxy_pass http://reception_service;
    }
    location /api/housekeeping/ {
        rewrite ^/api/housekeeping/(.*)$ /$1 break;
        proxy_pass http://housekeeping_service;
    }
    location /api/room-service/ {
        rewrite ^/api/room-service/(.*)$ /$1 break;
        proxy_pass http://room_service;
    }
    location /api/maintenance/ {
        rewrite ^/api/maintenance/(.*)$ /$1 break;
        proxy_pass http://maintenance_service;
    }

    # ----- WebSocket -----
    location /ws {
        proxy_pass http://ws_gateway;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ----- SPA fallback -----
    # Vue Router uses HTML5 history mode — every unknown path resolves to
    # index.html so the client-side router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed Vite assets.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Health endpoint for upstream LBs / uptime checks.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
