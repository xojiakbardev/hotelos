name: hotelos

x-py-service: &py-service
  env_file: .env
  environment:
    PYTHONUNBUFFERED: "1"
    PYTHONDONTWRITEBYTECODE: "1"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  auth-service:
    <<: *py-service
    build: { context: ./server/auth-service }
    container_name: hotelos-auth
    environment:
      SERVICE_NAME: auth-service
      SERVICE_SCHEMA: auth
    volumes:
      - ./server/auth-service/src:/app/src
      - ./server/auth-service/alembic:/app/alembic
    command: >
      sh -c "python manage.py migrate &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src"
    expose: ["8000"]

  reception-service:
    <<: *py-service
    build: { context: ./server/reception-service }
    container_name: hotelos-reception
    environment:
      SERVICE_NAME: reception-service
      SERVICE_SCHEMA: reception
    volumes:
      - ./server/reception-service/src:/app/src
      - ./server/reception-service/alembic:/app/alembic
    command: >
      sh -c "python manage.py migrate &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src"
    expose: ["8000"]

  housekeeping-service:
    <<: *py-service
    build: { context: ./server/housekeeping-service }
    container_name: hotelos-housekeeping
    environment:
      SERVICE_NAME: housekeeping-service
      SERVICE_SCHEMA: housekeeping
    volumes:
      - ./server/housekeeping-service/src:/app/src
      - ./server/housekeeping-service/alembic:/app/alembic
      - housekeeping_uploads:/app/uploads
    command: >
      sh -c "python manage.py migrate &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src"
    expose: ["8000"]

  room-service:
    <<: *py-service
    build: { context: ./server/room-service }
    container_name: hotelos-room-service
    environment:
      SERVICE_NAME: room-service
      SERVICE_SCHEMA: room_service
    volumes:
      - ./server/room-service/src:/app/src
      - ./server/room-service/alembic:/app/alembic
    command: >
      sh -c "python manage.py migrate &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src"
    expose: ["8000"]

  maintenance-service:
    <<: *py-service
    build: { context: ./server/maintenance-service }
    container_name: hotelos-maintenance
    environment:
      SERVICE_NAME: maintenance-service
      SERVICE_SCHEMA: maintenance
    volumes:
      - ./server/maintenance-service/src:/app/src
      - ./server/maintenance-service/alembic:/app/alembic
    command: >
      sh -c "python manage.py migrate &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src"
    expose: ["8000"]

  ws-gateway:
    <<: *py-service
    build: { context: ./server/ws-gateway }
    container_name: hotelos-ws-gateway
    environment:
      SERVICE_NAME: ws-gateway
    volumes:
      - ./server/ws-gateway/src:/app/src
    command: >
      sh -c "uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src"
    expose: ["8000"]

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hotelos-client
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_WS_URL: ${VITE_WS_URL}
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
      - ./client/vite.config.ts:/app/vite.config.ts
      - ./client/tailwind.config.js:/app/tailwind.config.js
      - ./client/postcss.config.js:/app/postcss.config.js
      - ./client/tsconfig.json:/app/tsconfig.json
    expose:
      - "80"
    depends_on:
      - auth-service

  nginx:
    image: nginx:1.27-alpine
    container_name: hotelos-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "8080:80"
    depends_on:
      - client
      - auth-service
      - reception-service
      - housekeeping-service
      - room-service
      - maintenance-service
      - ws-gateway

volumes:
  postgres_data:
  redis_data:
  housekeeping_uploads:
