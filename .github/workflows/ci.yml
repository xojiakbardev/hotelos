name: CI

# Runs on every push (any branch) and every PR targeting main.
# Stages:
#   1. Backend syntax check  — `python -m py_compile` over every .py file.
#   2. Frontend build        — `npm run build` for the Vue client.
#   3. Docker matrix build   — verify each service Dockerfile builds cleanly.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile-check every Python source
        run: |
          set -e
          find server -name '*.py' -not -path '*/alembic/versions/*' -print0 | \
            xargs -0 -n1 python -m py_compile

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: client
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: auth-service,         context: server/auth-service         }
          - { name: reception-service,    context: server/reception-service    }
          - { name: housekeeping-service, context: server/housekeeping-service }
          - { name: room-service,         context: server/room-service         }
          - { name: maintenance-service,  context: server/maintenance-service  }
          - { name: ws-gateway,           context: server/ws-gateway           }
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service.name }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 15
          retry_wait_seconds: 20
          command: docker build -t hotelos-${{ matrix.service.name }}:ci ${{ matrix.service.context }}

  nginx:
    name: Nginx (SPA build + reverse proxy) image
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build nginx image (multi-stage Vue build + nginx)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 15
          retry_wait_seconds: 20
          command: docker build -f nginx/Dockerfile.prod -t hotelos-nginx:ci .
